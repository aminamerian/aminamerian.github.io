<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FCM Push Token</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3d8bfd;
      --error: #f07178;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(ellipse at top, #1e3a5f 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }

    main {
      width: min(40rem, 100%);
    }

    button {
      display: block;
      width: 100%;
      padding: 0.85rem 1.25rem;
      border: 0;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    #token-status {
      margin: 0.75rem 0 0;
      padding: 1rem;
      min-height: 4.5rem;
      border-radius: 0.5rem;
      background: var(--surface);
      color: var(--muted);
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 0.85rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #token-status.is-error {
      color: var(--error);
    }

    #token-status.is-token {
      color: var(--text);
    }
  </style>
</head>

<body>
  <main>
    <button type="button" id="get-token-btn">Get push token</button>
    <pre id="token-status" aria-live="polite">Click the button to request permission and fetch your FCM token.</pre>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      getMessaging,
      getToken,
      isSupported,
      onMessage,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjp1wh93oOaI44iDcZMSivjzSVEjHI_eM",
      authDomain: "personal-website-8c1d9.firebaseapp.com",
      projectId: "personal-website-8c1d9",
      storageBucket: "personal-website-8c1d9.firebasestorage.app",
      messagingSenderId: "638275138476",
      appId: "1:638275138476:web:e2bf4ae4bfa404e00e8009",
      measurementId: "G-DK0C5G97RJ",
    };

    // Must match firebase-js-sdk DEFAULT_SW_SCOPE
    const FCM_SW_SCOPE = "/firebase-cloud-messaging-push-scope";

    // Web Push certificate public key from Firebase Console →
    // Project settings → Cloud Messaging → Web Push certificates
    const vapidKey =
      "BGunPWXUtJffDFh2Hoz-meplQ0aqvECCjEx2sbsMf7eyGm_SKx1g48n-6wNWtROFyqV4tGLGzAchhgZaalyGZJY";

    const app = initializeApp(firebaseConfig);
    const button = document.getElementById("get-token-btn");
    const statusEl = document.getElementById("token-status");

    function setStatus(message, kind = "info") {
      statusEl.textContent = message;
      statusEl.classList.toggle("is-error", kind === "error");
      statusEl.classList.toggle("is-token", kind === "token");
    }

    function withTimeout(promise, ms, message) {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = setTimeout(() => reject(new Error(message)), ms);
      });
      return Promise.race([promise, timeout]).finally(() =>
        clearTimeout(timeoutId)
      );
    }

    function vapidKeyToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding)
        .replace(/-/g, "+")
        .replace(/_/g, "/");
      const raw = atob(base64);
      return Uint8Array.from(raw, (c) => c.charCodeAt(0));
    }

    async function waitForActivated(registration) {
      const worker =
        registration.installing || registration.waiting || registration.active;
      if (!worker) {
        throw new Error("Service worker registration has no worker.");
      }
      if (worker.state === "activated") {
        return registration;
      }
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          reject(
            new Error("Service worker did not activate within 10 seconds.")
          );
        }, 10000);
        worker.addEventListener("statechange", () => {
          if (worker.state === "activated") {
            clearTimeout(timer);
            resolve();
          } else if (worker.state === "redundant") {
            clearTimeout(timer);
            reject(new Error("Service worker became redundant."));
          }
        });
      });
      return registration;
    }

    /**
     * Clear stale registrations (e.g. old scope "/") then register with
     * Firebase's default messaging scope.
     */
    async function registerMessagingServiceWorker() {
      const existing = await navigator.serviceWorker.getRegistrations();
      await Promise.all(existing.map((reg) => reg.unregister()));

      const registration = await navigator.serviceWorker.register(
        "/firebase-messaging-sw.js",
        { scope: FCM_SW_SCOPE }
      );
      return waitForActivated(registration);
    }

    button.addEventListener("click", async () => {
      button.disabled = true;
      setStatus("Requesting notification permission…");

      try {
        if (!(await isSupported())) {
          throw new Error(
            "This browser does not support Firebase Cloud Messaging."
          );
        }

        if (!("Notification" in window) || !("serviceWorker" in navigator)) {
          throw new Error(
            "Notifications or service workers are not available in this browser."
          );
        }

        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          throw new Error(
            "Notification permission was denied. Allow notifications for this site and try again."
          );
        }

        setStatus("Registering messaging service worker…");
        const serviceWorkerRegistration = await withTimeout(
          registerMessagingServiceWorker(),
          15000,
          "Timed out registering/activating the messaging service worker."
        );

        if (!serviceWorkerRegistration.active) {
          throw new Error(
            "Service worker registered but is not active yet. Try again."
          );
        }

        // Isolate browser push vs Firebase/Google API failures.
        setStatus("Creating browser push subscription…");
        let pushSubscription =
          await serviceWorkerRegistration.pushManager.getSubscription();
        if (!pushSubscription) {
          pushSubscription = await withTimeout(
            serviceWorkerRegistration.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: vapidKeyToUint8Array(vapidKey),
            }),
            15000,
            "Timed out on PushManager.subscribe (browser push service)."
          );
        }

        setStatus(
          "Fetching FCM token from Google (Installations + FCM APIs)…"
        );
        const messaging = getMessaging(app);
        onMessage(messaging, (payload) => {
          console.log("Foreground FCM message:", payload);
        });

        const token = await withTimeout(
          getToken(messaging, {
            vapidKey,
            serviceWorkerRegistration,
          }),
          20000,
          "Timed out calling Google FCM/Installations APIs. If you are in a region that blocks Google, try a VPN; also confirm the VAPID key in Firebase Console."
        );

        if (!token) {
          throw new Error(
            "No registration token available. Check that Cloud Messaging is enabled for this web app."
          );
        }

        setStatus(token, "token");
      } catch (error) {
        console.error(error);
        setStatus(error?.message || String(error), "error");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>

</html>
