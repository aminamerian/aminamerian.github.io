<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FCM Push Token</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3d8bfd;
      --error: #f07178;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(ellipse at top, #1e3a5f 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }

    main {
      width: min(40rem, 100%);
    }

    button {
      display: block;
      width: 100%;
      padding: 0.85rem 1.25rem;
      border: 0;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    #token-status {
      margin: 0.75rem 0 0;
      padding: 1rem;
      min-height: 4.5rem;
      border-radius: 0.5rem;
      background: var(--surface);
      color: var(--muted);
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 0.85rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #token-status.is-error {
      color: var(--error);
    }

    #token-status.is-token {
      color: var(--text);
    }
  </style>
</head>

<body>
  <main>
    <button type="button" id="get-token-btn">Get push token</button>
    <pre id="token-status" aria-live="polite">Click the button to request permission and fetch your FCM token.</pre>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      getMessaging,
      getToken,
      isSupported,
      onMessage,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-messaging.js";
    import {
      getInstallations,
      getId,
      getToken as getInstallationAuthToken,
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-installations.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjp1wh93oOaI44iDcZMSivjzSVEjHI_eM",
      authDomain: "personal-website-8c1d9.firebaseapp.com",
      projectId: "personal-website-8c1d9",
      storageBucket: "personal-website-8c1d9.firebasestorage.app",
      messagingSenderId: "638275138476",
      appId: "1:638275138476:web:e2bf4ae4bfa404e00e8009",
      measurementId: "G-DK0C5G97RJ",
    };

    // Must match firebase-js-sdk DEFAULT_SW_SCOPE
    const FCM_SW_SCOPE = "/firebase-cloud-messaging-push-scope";

    // Web Push certificate public key from Firebase Console →
    // Project settings → Cloud Messaging → Web Push certificates
    const vapidKey =
      "BGunPWXUtJffDFh2Hoz-meplQ0aqvECCjEx2sbsMf7eyGm_SKx1g48n-6wNWtROFyqV4tGLGzAchhgZaalyGZJY";

    const app = initializeApp(firebaseConfig);
    const button = document.getElementById("get-token-btn");
    const statusEl = document.getElementById("token-status");
    const logLines = [];

    function setStatus(message, kind = "info") {
      statusEl.textContent = message;
      statusEl.classList.toggle("is-error", kind === "error");
      statusEl.classList.toggle("is-token", kind === "token");
    }

    function log(step, detail) {
      const line = `[${step}] ${detail}`;
      logLines.push(line);
      console.log(line);
      setStatus(logLines.join("\n"));
    }

    function withTimeout(promise, ms, message) {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = setTimeout(() => reject(new Error(message)), ms);
      });
      return Promise.race([promise, timeout]).finally(() =>
        clearTimeout(timeoutId)
      );
    }

    function vapidKeyToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding)
        .replace(/-/g, "+")
        .replace(/_/g, "/");
      const raw = atob(base64);
      return Uint8Array.from(raw, (c) => c.charCodeAt(0));
    }

    function arrayToBase64Url(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const base64 = btoa(String.fromCharCode(...bytes));
      return base64.replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
    }

    async function waitForActivated(registration) {
      const worker =
        registration.installing || registration.waiting || registration.active;
      if (!worker) {
        throw new Error("Service worker registration has no worker.");
      }
      if (worker.state === "activated") {
        return registration;
      }
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          reject(
            new Error("Service worker did not activate within 10 seconds.")
          );
        }, 10000);
        worker.addEventListener("statechange", () => {
          if (worker.state === "activated") {
            clearTimeout(timer);
            resolve();
          } else if (worker.state === "redundant") {
            clearTimeout(timer);
            reject(new Error("Service worker became redundant."));
          }
        });
      });
      return registration;
    }

    async function registerMessagingServiceWorker() {
      const existing = await navigator.serviceWorker.getRegistrations();
      await Promise.all(existing.map((reg) => reg.unregister()));

      const registration = await navigator.serviceWorker.register(
        "/firebase-messaging-sw.js",
        { scope: FCM_SW_SCOPE }
      );
      return waitForActivated(registration);
    }

    async function probeUrl(label, url, init) {
      const started = performance.now();
      try {
        const response = await withTimeout(
          fetch(url, init),
          10000,
          `${label}: fetch timed out after 10s`
        );
        const ms = Math.round(performance.now() - started);
        log(label, `HTTP ${response.status} in ${ms}ms`);
        return response;
      } catch (error) {
        const ms = Math.round(performance.now() - started);
        log(label, `FAILED in ${ms}ms — ${error.message}`);
        throw error;
      }
    }

    button.addEventListener("click", async () => {
      button.disabled = true;
      logLines.length = 0;

      try {
        log("0", "Checking browser support…");
        if (!(await isSupported())) {
          throw new Error("Firebase Cloud Messaging is not supported here.");
        }
        if (!("Notification" in window) || !("serviceWorker" in navigator)) {
          throw new Error("Notifications/service workers unavailable.");
        }
        log("0", "OK");

        log("1", "Requesting notification permission…");
        const permission = await Notification.requestPermission();
        log("1", `permission=${permission}`);
        if (permission !== "granted") {
          throw new Error("Notification permission was denied.");
        }

        log("2", "Registering messaging service worker…");
        const serviceWorkerRegistration = await withTimeout(
          registerMessagingServiceWorker(),
          15000,
          "SW register/activate timed out"
        );
        log(
          "2",
          `OK scope=${serviceWorkerRegistration.scope} active=${!!serviceWorkerRegistration.active}`
        );

        log("3", "Creating browser push subscription…");
        let pushSubscription =
          await serviceWorkerRegistration.pushManager.getSubscription();
        if (!pushSubscription) {
          pushSubscription = await withTimeout(
            serviceWorkerRegistration.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: vapidKeyToUint8Array(vapidKey),
            }),
            15000,
            "PushManager.subscribe timed out"
          );
        }
        log("3", `OK endpoint=${pushSubscription.endpoint.slice(0, 48)}…`);

        log("4a", "Probing Installations API reachability…");
        await probeUrl(
          "4a",
          `https://firebaseinstallations.googleapis.com/v1/projects/${firebaseConfig.projectId}/installations`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
              "x-goog-api-key": firebaseConfig.apiKey,
            },
            body: JSON.stringify({
              appId: firebaseConfig.appId,
              authVersion: "FIS_v2",
              sdkVersion: "w:0.6.0",
            }),
          }
        );

        log("4b", "Getting Firebase Installation ID…");
        const installations = getInstallations(app);
        const fid = await withTimeout(
          getId(installations),
          15000,
          "getId (Installations) timed out — often IndexedDB or Installations API"
        );
        log("4b", `OK fid=${fid}`);

        log("4c", "Getting Installations auth token…");
        const installAuth = await withTimeout(
          getInstallationAuthToken(installations),
          15000,
          "getInstallationAuthToken timed out"
        );
        log("4c", `OK authToken length=${installAuth.length}`);

        // Bypass SDK getToken first: proves FCM registrations API works and
        // avoids IndexedDB deadlock with a messaging-enabled service worker.
        log("5a", "Calling FCM registrations API directly…");
        const authKey = pushSubscription.getKey("auth");
        const p256dhKey = pushSubscription.getKey("p256dh");
        if (!authKey || !p256dhKey) {
          throw new Error("Push subscription is missing auth/p256dh keys.");
        }

        const fcmResponse = await probeUrl(
          "5a",
          `https://fcmregistrations.googleapis.com/v1/projects/${firebaseConfig.projectId}/registrations`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
              "x-goog-api-key": firebaseConfig.apiKey,
              "x-goog-firebase-installations-auth": `FIS ${installAuth}`,
            },
            body: JSON.stringify({
              web: {
                origin: new URL(serviceWorkerRegistration.scope).host,
                endpoint: pushSubscription.endpoint,
                auth: arrayToBase64Url(authKey),
                p256dh: arrayToBase64Url(p256dhKey),
                applicationPubKey: vapidKey,
              },
            }),
          }
        );

        const fcmJson = await fcmResponse.json();
        if (!fcmResponse.ok) {
          throw new Error(
            `FCM registrations failed: ${fcmJson?.error?.message || fcmResponse.status}`
          );
        }
        if (!fcmJson.token) {
          throw new Error(
            `FCM registrations returned no token: ${JSON.stringify(fcmJson)}`
          );
        }
        log("5a", `OK token from direct FCM API (${fcmJson.token.length} chars)`);

        log("5b", "Also trying SDK getToken (may still use IndexedDB)…");
        let sdkToken = null;
        try {
          const messaging = getMessaging(app);
          onMessage(messaging, (payload) => {
            console.log("Foreground FCM message:", payload);
          });
          sdkToken = await withTimeout(
            getToken(messaging, {
              vapidKey,
              serviceWorkerRegistration,
            }),
            10000,
            "SDK getToken timed out (IndexedDB likely still blocked)"
          );
          log("5b", sdkToken ? `OK sdk token length=${sdkToken.length}` : "empty");
        } catch (sdkError) {
          log("5b", `skipped — ${sdkError.message}`);
        }

        logLines.length = 0;
        setStatus(sdkToken || fcmJson.token, "token");
      } catch (error) {
        console.error(error);
        log("ERROR", error?.message || String(error));
        setStatus(logLines.join("\n"), "error");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>

</html>
